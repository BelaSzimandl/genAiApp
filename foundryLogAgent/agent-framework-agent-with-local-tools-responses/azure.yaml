# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: log-insights-agent
services:
    ai-project:
        host: azure.ai.project
        deployments: []
    log-insights-agent:
        project: src/agent-framework-agent-with-local-tools-responses
        host: azure.ai.agent
        language: python
        uses:
            - ai-project
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: LLM log insights chatbot with Cosmos-backed tools hosted in Azure AI Foundry.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: LOG_DATA_SOURCE
              value: ${LOG_DATA_SOURCE}
            - name: COSMOS_ENDPOINT
              value: ${COSMOS_ENDPOINT}
            - name: COSMOS_KEY
              value: ${COSMOS_KEY}
            - name: COSMOS_DATABASE
              value: ${COSMOS_DATABASE}
            - name: COSMOS_CONTAINER
              value: ${COSMOS_CONTAINER}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - Log Insights
                - Cosmos DB
                - Responses Protocol
        name: log-insights-agent
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
